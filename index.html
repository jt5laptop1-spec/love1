<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তুমি কি আমাকে পছন্দ করো? 💕</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e0f2ff 50%, #fef3c7 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .question-text {
            font-size: clamp(2rem, 5vw, 3.5rem);
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .btn-yes {
            transition: all 0.3s ease;
        }

        .btn-yes:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-yes:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-no {
            position: absolute;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-no:hover {
            transform: scale(1.05);
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) scale(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-100px) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(0.5);
                opacity: 0;
            }
        }

        .heart {
            position: fixed;
            font-size: 2rem;
            animation: heartFloat 2s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        .message-popup {
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="text-center relative w-full max-w-2xl">
        <!-- Main Question -->
        <div class="mb-12">
            <h1 class="question-text font-bold text-purple-800 mb-4">
                তুমি কি আমাকে পছন্দ করো?
            </h1>
            <p class="text-xl text-gray-600 mb-2">🥺</p>
        </div>

        <!-- Buttons Container -->
        <div class="relative flex justify-center gap-6 mb-8" style="min-height: 80px;">
            <!-- YES Button (static position) -->
            <button id="yesBtn" class="btn-yes bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl">
                ✅ হ্যাঁ
            </button>

            <!-- NO Button (will move around) -->
            <button id="noBtn" class="btn-no bg-red-400 hover:bg-red-500 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl">
                ❌ না
            </button>
        </div>

        <!-- Message Popup (hidden by default) -->
        <div id="messagePopup" class="hidden message-popup fixed inset-0 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md mx-auto text-center border-4 border-pink-300">
                <div class="text-6xl mb-4">💖</div>
                <h2 class="text-3xl font-bold text-pink-600 mb-2">
                    Thank you for your answer ❤️
                </h2>
                <p class="text-xl text-gray-700 mt-4">
                    আমিও তোমাকে পছন্দ করি! 🥰
                </p>
            </div>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const messagePopup = document.getElementById('messagePopup');

        let noBtnMoved = false;

        // Initialize NO button position
        function initNoBtnPosition() {
            const container = noBtn.parentElement;
            const rect = container.getBoundingClientRect();
            noBtn.style.position = 'relative';
            noBtn.style.left = '0';
            noBtn.style.top = '0';
        }

        initNoBtnPosition();

        // Move NO button to random position
        function moveNoButton() {
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Calculate safe boundaries (with padding)
            const padding = 20;
            const maxX = viewportWidth - btnWidth - padding;
            const maxY = viewportHeight - btnHeight - padding;

            // Generate random position
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            // Change to fixed positioning for moving around the viewport
            if (!noBtnMoved) {
                noBtn.style.position = 'fixed';
                noBtnMoved = true;
            }

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // Add shake effect to the question
            const questionText = document.querySelector('.question-text');
            questionText.classList.add('shake');
            setTimeout(() => {
                questionText.classList.remove('shake');
            }, 300);
        }

        // Create floating hearts animation
        function createHearts() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    
                    // Random horizontal position
                    const randomX = Math.random() * window.innerWidth;
                    heart.style.left = randomX + 'px';
                    heart.style.top = window.innerHeight / 2 + 'px';
                    
                    document.body.appendChild(heart);

                    // Remove after animation
                    setTimeout(() => {
                        heart.remove();
                    }, 2000);
                }, i * 100);
            }
        }

        // YES button click handler
        yesBtn.addEventListener('click', function() {
            // Disable YES button
            yesBtn.disabled = true;
            
            // Hide NO button
            noBtn.style.display = 'none';
            
            // Show message popup
            messagePopup.classList.remove('hidden');
            
            // Create hearts animation
            createHearts();
        });

        // NO button hover handler
        noBtn.addEventListener('mouseenter', function() {
            moveNoButton();
        });

        // NO button click handler (as backup)
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        // Touch support for mobile
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveNoButton();
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (noBtnMoved) {
                // Ensure button stays within viewport after resize
                const btnRect = noBtn.getBoundingClientRect();
                if (btnRect.right > window.innerWidth || btnRect.bottom > window.innerHeight) {
                    moveNoButton();
                }
            }
        });
    </script>
</body>
</html>
